# Aturan Konfigurasi Host Virtual Nginx aaPanel
# Salin dan tempel konfigurasi ini ke tab "Nginx Config" di pengaturan situs aaPanel Anda.
# Web Root: /www/wwwroot/noxara.page

server {
    listen 80;
    listen 443 ssl http2;
    server_name noxara.page www.noxara.page;
    index index.php index.html index.htm;
    root /www/wwwroot/noxara.page;

    # SSL Config aaPanel (Let's Encrypt)
    # ssl_certificate    /www/server/panel/vhost/cert/noxara.page/fullchain.pem;
    # ssl_certificate_key    /www/server/panel/vhost/cert/noxara.page/privkey.pem;
    # ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    # ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # 1. BLOKIR AKSES DIREKTORI SENSITIF
    # Menghindari penelusuran file konfigurasi backend dan sistem oleh bot/peretas
    location ~* ^/(config|includes|actions|database|cron|storage|nginx)/ {
        deny all;
        return 403;
    }

    # 2. BLOKIR EXTENSION FILE RAW DAN CADANGAN
    # Mencegah terunduhnya file database SQL, log error, dan file setelan mentah
    location ~* \.(sql|log|env|bak|backup|ini|conf|sh)$ {
        deny all;
        return 403;
    }

    # 3. BLOKIR PENGEKSEKUSIAN PHP DI FOLDER UPLOADS
    # Proteksi mutlak jika peretas berhasil menyelundupkan file backdoor .php di folder file statis
    location ~* ^/uploads/.*\.php$ {
        deny all;
        return 403;
    }

    # 4. BLOKIR DOT-FILES (File awalan titik seperti .env / .git)
    location ~ /\. {
        deny all;
        return 403;
    }

    # Aturan routing standar aaPanel PHP-FPM
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # penanganan file php
    location ~ \.php$ {
        include enable-php-82.conf; # pastikan PHP 8.2 terpasang di aaPanel Anda
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # cache statis file assets
    location ~* \.(gif|jpg|jpeg|png|css|js|ico|webp|svg|woff|woff2|ttf|pdf)$ {
        expires 30d;
        access_log off;
    }
}
